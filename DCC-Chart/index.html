// ── SVG helper ───────────────────────────────────────────────────────
function mk(tag,a){const e=document.createElementNS("http://www.w3.org/2000/svg",tag);if(a)Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e;}
function getRC(t){return(REL_TYPES.find(r=>r.id===t)||{color:"#888"}).color;}
function getRD(t){return(REL_TYPES.find(r=>r.id===t)||{dash:null}).dash;}
function curvePath(x1,y1,x2,y2){const mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1,b=Math.min(55,len*.22);return`M${x1},${y1} Q${mx-dy/len*b},${my+dx/len*b} ${x2},${y2}`;}

// ── SVG render ────────────────────────────────────────────────────────
function renderSVG(){
  while(svgEl.firstChild)svgEl.removeChild(svgEl.lastChild);

  const defs=mk("defs");
  const mkr=mk("marker",{id:"arr",markerWidth:6,markerHeight:6,refX:6,refY:3,orient:"auto"});
  mkr.appendChild(mk("path",{d:"M0,0 L0,6 L6,3 z",fill:"#3a4a6a"}));
  defs.appendChild(mkr);svgEl.appendChild(defs);

  const g=mk("g",{transform:`translate(${S.pan.x},${S.pan.y}) scale(${S.scale})`});
  svgEl.appendChild(g);

  // ── Layer 1: Floor bands ──
  if(S.showBands){
    BANDS.forEach(b=>{
      g.appendChild(mk("rect",{x:0,y:b.y,width:1000,height:b.h,fill:b.fill}));
      g.appendChild(mk("line",{x1:0,y1:b.y,x2:1000,y2:b.y,stroke:b.border,"stroke-width":.6,opacity:.5}));
      const t=mk("text",{x:8,y:b.y+15,fill:b.border,"font-size":9,"font-weight":"bold",opacity:.9,"pointer-events":"none"});
      t.textContent=b.label;g.appendChild(t);
      const t2=mk("text",{x:992,y:b.y+15,fill:b.border,"font-size":9,"font-weight":"bold","text-anchor":"end",opacity:.9,"pointer-events":"none"});
      t2.textContent=b.label;g.appendChild(t2);
    });
  }

  // ── Layer 2: Floor 9 Faction Wars sub-factions ──
  const f9band=BANDS.find(b=>b.id==="f9");
  if(S.showF9&&S.book>=7&&f9band){
    const fy=f9band.y,fh=f9band.h;
    const labelH=16; // reserve top pixels for alliance header
    const zoneY=fy+labelH;
    const zoneH=fh-labelH;

    // Alliance header bars (top strip of F9 band)
    // Good Guys header
    g.appendChild(mk("rect",{x:0,y:fy,width:260,height:labelH,fill:"rgba(15,60,15,.85)",rx:0}));
    const ggt=mk("text",{x:130,y:fy+11,fill:"#5aee6a","font-size":8,"text-anchor":"middle","font-weight":"bold","pointer-events":"none"});
    ggt.textContent="✦ THE GOOD GUYS";g.appendChild(ggt);
    // Bloc header
    g.appendChild(mk("rect",{x:260,y:fy,width:740,height:labelH,fill:"rgba(70,10,10,.85)",rx:0}));
    const blt=mk("text",{x:630,y:fy+11,fill:"#ee5a5a","font-size":8,"text-anchor":"middle","font-weight":"bold","pointer-events":"none"});
    blt.textContent="⚔ THE BLOC (8 factions vs Princess Posse)";g.appendChild(blt);

    // Faction zone rectangles — occupy zoneY to zoneY+zoneH
    F9_FACTIONS.forEach(f=>{
      g.appendChild(mk("rect",{x:f.x,y:zoneY,width:f.w,height:zoneH,fill:f.fill,stroke:f.border,"stroke-width":1.2,"stroke-dasharray":f.alliance==="good"?"none":"4 3"}));
      // Faction name centered vertically in zone
      const lbl=mk("text",{x:f.x+f.w/2,y:zoneY+zoneH/2+4,fill:f.border,"font-size":7,"text-anchor":"middle","font-weight":"bold","pointer-events":"none",opacity:.95});
      lbl.textContent=f.short;g.appendChild(lbl);
      // Full name below short name if enough width
      if(f.w>=90){
        const lbl2=mk("text",{x:f.x+f.w/2,y:zoneY+zoneH/2+14,fill:f.border,"font-size":6,"text-anchor":"middle","pointer-events":"none",opacity:.8});
        lbl2.textContent=f.label;g.appendChild(lbl2);
      }
    });

    // Alliance connector line between the two Good Guys factions
    const ppCx=65,trCx=195,allyY=zoneY+zoneH/2;
    g.appendChild(mk("line",{x1:ppCx,y1:allyY,x2:trCx,y2:allyY,stroke:"#5aee6a","stroke-width":2.5,opacity:.9}));
    const alt=mk("text",{x:(ppCx+trCx)/2,y:allyY-5,fill:"#5aee6a","font-size":6,"text-anchor":"middle","pointer-events":"none"});
    alt.textContent="married/allied";g.appendChild(alt);

    // War Mage Rebellion note — sits just BELOW the F9 band, not inside it
    const wmY=fy+fh+3;
    g.appendChild(mk("rect",{x:260,y:wmY,width:740,height:11,fill:"rgba(60,55,5,.75)",rx:2}));
    const wmt=mk("text",{x:630,y:wmY+8,fill:"#eebb30","font-size":6,"text-anchor":"middle","pointer-events":"none"});
    wmt.textContent="⚡ War Mage Rebellion added mid-game (Warlords: Agatha & Akuma)";g.appendChild(wmt);
  }

  // ── Layer 3: Relationship edges ──
  const visNodes=NODES.filter(n=>n.book<=S.book);
  const visEdges=EDGES.filter(e=>e.book<=S.book&&(S.rel==="all"||e.type===S.rel));
  visEdges.forEach(e=>{
    const fp=S.pos[e.from],tp=S.pos[e.to];if(!fp||!tp)return;
    const col=getRC(e.type),dash=getRD(e.type),hi=S.rel==="all"||S.rel===e.type;
    const p=mk("path",{d:curvePath(fp.x,fp.y,tp.x,tp.y),fill:"none",stroke:col,"stroke-width":hi?1.5:.3,opacity:hi?.5:.08,"marker-end":"url(#arr)"});
    if(dash)p.setAttribute("stroke-dasharray",dash);
    g.appendChild(p);
    if(hi){
      const mx=(fp.x+tp.x)/2,my=(fp.y+tp.y)/2;
      const l=mk("text",{x:mx,y:my-4,fill:col,"font-size":6.5,"text-anchor":"middle",opacity:.8,"pointer-events":"none"});
      l.textContent=e.label;g.appendChild(l);
    }
  });

  // ── Layer 4: Character nodes ──
  visNodes.forEach(n=>{
    const pos=S.pos[n.id];if(!pos)return;
    const r=n.size==="main"?24:16;
    const faded=n.lastBook<S.book,isNew=n.book===S.book,sel=S.selNode&&S.selNode.id===n.id;
    const nc=FC[n.faction]||"#888";
    const grp=mk("g",{"data-id":n.id,style:"cursor:pointer",opacity:faded?.2:1});
    g.appendChild(grp);
    if(isNew)grp.appendChild(mk("circle",{cx:pos.x,cy:pos.y,r:r+7,fill:"none",stroke:nc,"stroke-width":1.5,"stroke-dasharray":"4 3",opacity:.9}));
    grp.appendChild(mk("circle",{cx:pos.x,cy:pos.y,r,fill:sel?nc:"#0e1628",stroke:nc,"stroke-width":sel?2.5:1.5}));
    const ini=mk("text",{x:pos.x,y:pos.y+4,fill:sel?"#06101e":nc,"font-size":n.size==="main"?9:7,"text-anchor":"middle","font-weight":"bold","pointer-events":"none"});
    ini.textContent=n.label.split(" ").map(w=>w[0]).join("").slice(0,3);grp.appendChild(ini);
    const lbl=mk("text",{x:pos.x,y:pos.y+r+12,fill:sel?"#f4c47a":nc,"font-size":n.size==="main"?10:8.5,"text-anchor":"middle","font-weight":n.size==="main"?"bold":"normal","pointer-events":"none"});
    lbl.textContent=n.label;grp.appendChild(lbl);
    if(n.status==="dead"){const sk=mk("text",{x:pos.x+r*.65,y:pos.y-r*.65,"font-size":10,"pointer-events":"none"});sk.textContent="💀";grp.appendChild(sk);}
    if(faded){const xt=mk("text",{x:pos.x,y:pos.y+r+22,fill:n.status==="dead"?"#cc5a5a":"#445","font-size":6.5,"text-anchor":"middle","pointer-events":"none"});xt.textContent=n.status==="dead"?"(deceased)":"(inactive)";grp.appendChild(xt);}
    // F9 badge
    if(S.book>=7&&n.f9){
      const f9f=F9_FACTIONS.find(f=>f.id===n.f9);
      if(f9f)grp.appendChild(mk("circle",{cx:pos.x-r*.65,cy:pos.y+r*.65,r:4.5,fill:f9f.fill,stroke:f9f.border,"stroke-width":1}));
    }
    grp.addEventListener("mousedown",e=>{e.stopPropagation();S.ndrag=n.id;});
    grp.addEventListener("click",e=>{e.stopPropagation();if(!S.wasDrag){S.selNode=n;renderSidebar();}});
  });

  renderLegend();
}

// ── Draggable Legend overlay ──────────────────────────────────────────
function renderLegend(){
  let tog=document.getElementById("leg-tog");
  if(!tog){
    tog=document.createElement("button");tog.id="leg-tog";
    tog.style.cssText="position:absolute;bottom:10px;left:10px;background:#0a0f1cee;border:1px solid #2a3a5a;border-radius:6px;padding:4px 10px;font-size:.63rem;color:#7aabcc;cursor:pointer;z-index:10;display:none";
    tog.textContent="📋 Show Legend";
    tog.onclick=()=>{legVisible=true;renderLegend();};
    canvasEl.appendChild(tog);
  }

  let leg=document.getElementById("leg-ov");
  if(!leg){
    leg=document.createElement("div");leg.id="leg-ov";
    leg.style.cssText="position:absolute;left:10px;bottom:10px;background:#0a0f1cee;border:1px solid #2a3a5a;border-radius:8px;font-size:.61rem;color:#99b;z-index:10;min-width:210px;user-select:none;box-shadow:0 2px 12px #000a";
    canvasEl.appendChild(leg);

    // drag logic
    leg.addEventListener("mousedown",e=>{
      const hdr=document.getElementById("leg-hdr");
      if(!hdr||!hdr.contains(e.target))return;
      legDragging=true;
      const r=leg.getBoundingClientRect();
      legDragStart={mx:e.clientX,my:e.clientY,lx:r.left,ly:r.top};
      e.preventDefault();
    });
  }

  tog.style.display=legVisible?"none":"block";

  if(!legVisible){leg.style.display="none";return;}
  leg.style.display="block";

  // Apply position
  if(legPos.y!==null){leg.style.bottom="auto";leg.style.top=legPos.y+"px";leg.style.left=legPos.x+"px";}
  else{leg.style.bottom="10px";leg.style.top="auto";leg.style.left=legPos.x+"px";}

  let h=`<div id="leg-hdr" style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid #1e2a40;cursor:move;border-radius:8px 8px 0 0;background:#0d1525">
    <span style="color:#7aabcc;font-weight:bold;font-size:.67rem;letter-spacing:1px">LEGEND</span>
    <button id="leg-close-btn" style="background:none;border:1px solid #3a4a6a;color:#99b;border-radius:5px;padding:0 5px;font-size:.63rem;cursor:pointer;line-height:1.5">✕</button>
  </div><div style="padding:9px 12px">`;

  h+="<div style='color:#7aabcc;font-size:.59rem;text-transform:uppercase;margin-bottom:3px'>Relationship Lines</div>";
  REL_TYPES.filter(r=>r.id!=="all").forEach(r=>{
    const ds=r.dash?"border-top:1.5px dashed "+r.color:"border-top:1.5px solid "+r.color;
    h+=`<div style='display:flex;align-items:center;gap:7px;margin:2px 0'><div style='width:26px;height:0;${ds};flex-shrink:0'></div><span style='color:${r.color}'>${r.label}</span></div>`;
  });
  h+="<div style='color:#7aabcc;font-size:.59rem;text-transform:uppercase;margin:7px 0 3px'>Character Factions</div>";
  Object.entries(FC).forEach(([k,v])=>{h+=`<div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:9px;height:9px;border-radius:50%;border:2px solid ${v};background:transparent;flex-shrink:0'></div><span>${FL[k]||k}</span></div>`;});
  h+="<div style='color:#7aabcc;font-size:.59rem;text-transform:uppercase;margin:7px 0 3px'>Icons</div>";
  [["💀","Deceased character"],["✦ dashed ring","New this book"],["Faded (20%)","Inactive/deceased"],["Large node","Main character"],["Small node","Supporting"],["◉ dot (B7+)","Floor 9 war faction"]].forEach(([ic,desc])=>{
    h+=`<div style='display:flex;align-items:center;gap:6px;margin:2px 0'><span style='color:#f4c47a;min-width:76px;flex-shrink:0'>${ic}</span><span>${desc}</span></div>`;
  });
  if(S.book>=7){
    h+="<div style='color:#7aabcc;font-size:.59rem;text-transform:uppercase;margin:7px 0 3px'>F9 Alliances</div>";
    h+=`<div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:26px;height:0;border-top:2px solid #5aee6a;flex-shrink:0'></div><span style='color:#5aee6a'>The Good Guys</span></div>`;
    h+=`<div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:26px;height:0;border-top:2px dashed #ee5a5a;flex-shrink:0'></div><span style='color:#ee5a5a'>The Bloc</span></div>`;
  }
  h+="</div>";
  leg.innerHTML=h;
  const closeBtn=document.getElementById("leg-close-btn");
  if(closeBtn)closeBtn.addEventListener("click",()=>{legVisible=false;renderLegend();});
}

window.addEventListener("mousemove",e=>{
  if(legDragging&&legDragStart){
    const leg=document.getElementById("leg-ov");
    if(!leg)return;
    const dx=e.clientX-legDragStart.mx,dy=e.clientY-legDragStart.my;
    const nx=legDragStart.lx+dx,ny=legDragStart.ly+dy;
    leg.style.left=nx+"px";leg.style.top=ny+"px";leg.style.bottom="auto";
    legPos={x:nx,y:ny};
  }
});
window.addEventListener("mouseup",()=>{legDragging=false;legDragStart=null;});

// ── Sidebar ────────────────────────────────────────────────────────────
function renderSidebar(){
  sidebarBody.innerHTML="";
  if(S.selNode){
    const n=NODES.find(x=>x.id===S.selNode.id);if(!n)return;
    sidebarTitle.textContent=n.label;
    const nc=FC[n.faction]||"#5aabcc";
    const f9f=S.book>=7&&n.f9?F9_FACTIONS.find(f=>f.id===n.f9):null;
    let html="<div id='card' style='padding:11px'>";
    html+="<h2 style='font-size:.88rem;color:#f4c47a;margin-bottom:4px'>"+n.label+"</h2>";
    html+="<span class='tag' style='background:"+nc+"99'>"+n.role+"</span>";
    if(n.status==="dead")html+="<span class='tag' style='background:#5a1a1a'>💀 Deceased</span>";
    if(n.book===S.book)html+="<span class='tag' style='background:#1a3a1a'>✦ New this book</span>";
    if(f9f)html+="<span class='tag' style='background:"+f9f.fill+";border:1px solid "+f9f.border+"'>⚔ "+f9f.label+"</span>";
    html+="<div class='bio'><b>Class/Magic:</b> "+n.magic+"<br><br>"+n.bio+"</div>";
    html+="<div class='ch4'>Connections</div><div id='clist'></div></div>";
    sidebarBody.innerHTML=html;
    const cl=document.getElementById("clist");
    const conns=EDGES.filter(e=>(e.from===n.id||e.to===n.id)&&e.book<=S.book);
    if(!conns.length){cl.innerHTML="<div class='ci' style='color:#445;padding:4px'>None visible yet</div>";}
    else conns.forEach(e=>{
      const oid=e.from===n.id?e.to:e.from,o=NODES.find(x=>x.id===oid);if(!o)return;
      const col=getRC(e.type);
      cl.insertAdjacentHTML("beforeend","<div class='ci'><span class='cn'>"+o.label+"</span> — "+e.label+" <span style='color:"+col+";font-size:.6rem'>["+e.type+"]</span></div>");
    });
  } else {
    sidebarTitle.textContent=BOOKS[S.book-1]?BOOKS[S.book-1].short:"Info";
    const b=BOOKS[S.book-1],evts=KEY_EVENTS[S.book]||[];
    let h="<div class='panel'><h3>"+b.title+"</h3><p style='color:#7aabcc;font-size:.67rem'>"+b.floor+" · "+b.year+"</p></div>";
    h+="<div class='panel'><h3>Key Events</h3>";
    evts.forEach((ev,i)=>{h+="<div class='evt"+(i<2?" major":"")+"'>"+ev+"</div>";});
    h+="</div>";
    if(S.book>=7){
      h+="<div class='panel'><h3>⚔ Floor 9 Factions</h3>";
      h+="<p style='color:#5aee6a;margin-bottom:4px;font-size:.67rem'>✦ THE GOOD GUYS</p>";
      F9_FACTIONS.filter(f=>f.alliance==="good").forEach(f=>{h+="<div class='evt' style='border-color:"+f.border+";color:"+f.border+"'>"+f.label+"</div>";});
      h+="<p style='color:#ee5a5a;margin:6px 0 4px;font-size:.67rem'>⚔ THE BLOC</p>";
      F9_FACTIONS.filter(f=>f.alliance==="bloc").forEach(f=>{h+="<div class='evt' style='border-color:"+f.border+";color:"+f.border+"'>"+f.label+"</div>";});
      h+="<p style='color:#eebb30;margin:6px 0 4px;font-size:.67rem'>⚡ MID-GAME ADDITION</p>";
      h+="<div class='evt' style='border-color:#eebb30;color:#eebb30'>War Mage Rebellion (Warlords: Agatha & Akuma)</div>";
      h+="</div>";
    }
    sidebarBody.innerHTML=h;
  }
}

function render(){renderCtrl();renderRelBar();renderSVG();renderSidebar();}

// ── Canvas interaction ─────────────────────────────────────────────────
let ms=null;
svgEl.addEventListener("mousedown",e=>{if(S.ndrag)return;ms={x:e.clientX,y:e.clientY,px:S.pan.x,py:S.pan.y};S.wasDrag=false;});
window.addEventListener("mousemove",e=>{
  if(legDragging)return;
  if(S.ndrag){S.wasDrag=true;const r=svgEl.getBoundingClientRect();S.pos[S.ndrag]={x:(e.clientX-r.left-S.pan.x)/S.scale,y:(e.clientY-r.top-S.pan.y)/S.scale};renderSVG();return;}
  if(ms){const dx=e.clientX-ms.x,dy=e.clientY-ms.y;if(Math.abs(dx)>3||Math.abs(dy)>3)S.wasDrag=true;S.pan={x:ms.px+dx,y:ms.py+dy};renderSVG();}
});
window.addEventListener("mouseup",()=>{if(!legDragging){S.ndrag=null;ms=null;setTimeout(()=>{S.wasDrag=false;},50);}});
svgEl.addEventListener("click",e=>{if(!S.wasDrag){S.selNode=null;renderSidebar();}});
canvasEl.addEventListener("wheel",e=>{e.preventDefault();S.scale=Math.min(3,Math.max(.18,S.scale-e.deltaY*.001));renderSVG();},{passive:false});

render();
</script>
</body>
</html>
