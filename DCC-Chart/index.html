<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dungeon Crawler Carl</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:#0d0a0a;
  color:#d4c9b8;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  /* subtle scanline overlay */
  background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
}

/* ── Header ─────────────────────────────────────────── */
#header{
  text-align:center;
  padding:8px 12px 6px;
  background:linear-gradient(180deg,#1a0505 0%,#0d0a0a 100%);
  border-bottom:2px solid #5a1010;
  position:relative;
  flex-shrink:0;
}
#header::before{
  content:'🔴 LIVE  •  BORANT CORP PRESENTS  •  🔴 LIVE';
  display:block;
  font-size:.55rem;
  color:#cc3333;
  letter-spacing:3px;
  margin-bottom:4px;
  font-family:'DM Sans',sans-serif;
  animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
#header h1{
  font-family:'Creepster',cursive;
  font-size:1.8rem;
  color:#e8341a;
  letter-spacing:3px;
  text-shadow:0 0 20px rgba(232,52,26,.4),2px 2px 0 #1a0505;
  line-height:1;
}
#header p{
  font-size:.6rem;
  color:#7a5a5a;
  margin-top:3px;
  font-family:'Special Elite',cursive;
  letter-spacing:1px;
}

/* ── Controls ───────────────────────────────────────── */
#controls{
  padding:5px 10px;
  background:#100808;
  border-bottom:1px solid #2a1010;
  flex-shrink:0;
}
.book-row{display:flex;gap:4px;justify-content:center;margin-bottom:3px}
.book-row:last-child{margin-bottom:0}

.btn{
  padding:3px 8px;
  border-radius:4px;
  border:1px solid #3a1a1a;
  background:#150a0a;
  color:#7a6060;
  font-size:.62rem;
  cursor:pointer;
  white-space:nowrap;
  transition:all .15s;
  flex:1;
  max-width:175px;
  text-align:center;
  font-family:'DM Sans',sans-serif;
}
.btn:hover{border-color:#cc3333;color:#e8a0a0}
.btn.book-on{background:#2a0808;border-color:#cc3333;color:#ff8080;font-weight:600}
.btn.tog{flex:0 0 auto;max-width:160px}
.btn.tog-on{border-color:#5a3a10;color:#e8a030;background:#1a1005}

/* ── Rel bar ────────────────────────────────────────── */
#relbar{
  display:flex;gap:4px;flex-wrap:wrap;justify-content:center;
  padding:4px 10px;
  background:#0a0606;
  border-bottom:1px solid #1a0808;
  flex-shrink:0;
}
.rbtn{
  padding:2px 9px;border-radius:4px;
  border:1px solid #2a1212;background:#0f0606;
  font-size:.62rem;cursor:pointer;color:#6a5050;
  transition:all .15s;font-family:'DM Sans',sans-serif;
}
.rbtn:hover{border-color:#cc3333}
.rbtn.active{font-weight:700}

/* ── Layout ─────────────────────────────────────────── */
#layout{display:flex;flex:1;overflow:hidden;min-height:0}
#canvas{flex:1;position:relative;overflow:hidden;background:#0a0707;cursor:grab}
#canvas:active{cursor:grabbing}
svg{width:100%;height:100%}

/* ── Sidebar ────────────────────────────────────────── */
#sidebar{
  width:270px;
  background:#0f0808;
  border-left:1px solid #2a1010;
  overflow-y:auto;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
}
#sidebar-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;
  border-bottom:1px solid #2a1010;
  flex-shrink:0;
  background:#150a0a;
}
#sidebar-header span{
  font-size:.65rem;color:#cc5a5a;
  text-transform:uppercase;letter-spacing:1px;
  font-family:'Special Elite',cursive;
}
#sidebar-close{
  background:none;border:1px solid #3a1a1a;
  color:#6a5050;border-radius:4px;
  padding:1px 7px;font-size:.65rem;cursor:pointer;
}
#sidebar-close:hover{border-color:#cc3333;color:#ff8080}
#sidebar-body{flex:1;overflow-y:auto}

/* ── Sidebar content ────────────────────────────────── */
.panel{padding:10px;border-bottom:1px solid #1a0a0a}
.panel h3{
  font-size:.65rem;color:#cc5a5a;
  text-transform:uppercase;letter-spacing:1px;
  margin-bottom:5px;font-family:'Special Elite',cursive;
}
.panel p{color:#7a6a6a;line-height:1.5;font-size:.67rem}
.evt{padding:3px 6px;margin:2px 0;border-left:2px solid #3a1a1a;background:#120808;color:#8a7070;font-size:.64rem}
.evt.major{border-color:#cc3333;color:#d4a090}

/* Character card */
#char-portrait{
  width:100%;
  aspect-ratio:1;
  background:linear-gradient(135deg,#1a0808,#0f0f0f);
  display:flex;align-items:center;justify-content:center;
  font-size:4rem;
  border-bottom:1px solid #2a1010;
  position:relative;
  overflow:hidden;
}
#char-portrait::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 60%,#0f0808 100%);
}
#char-portrait .faction-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:5px 10px;
  font-size:.6rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  font-family:'Special Elite',cursive;
  z-index:1;
}
#card-body{padding:12px}
#card-body h2{
  font-family:'Creepster',cursive;
  font-size:1.3rem;letter-spacing:1px;
  margin-bottom:3px;line-height:1;
}
.tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:.58rem;margin:2px;color:#fff}
.stat-row{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
.stat{
  background:#150a0a;border:1px solid #2a1010;
  border-radius:3px;padding:3px 7px;
  font-size:.6rem;color:#8a7070;
}
.stat b{color:#cc7a5a;display:block;font-size:.55rem;text-transform:uppercase;letter-spacing:.5px}
.bio-text{font-size:.67rem;color:#8a7070;line-height:1.55;margin-top:6px}
.ch4{font-size:.62rem;color:#cc5a5a;text-transform:uppercase;margin:10px 0 4px;font-weight:bold;font-family:'Special Elite',cursive}
.ci{font-size:.62rem;color:#7a6060;padding:3px 0;border-bottom:1px solid #1a0808}
.ci .cn{color:#e8a070}

/* ── Legend overlay ─────────────────────────────────── */
#leg-ov{
  position:absolute;bottom:10px;left:10px;
  background:#0f0808ee;border:1px solid #3a1a1a;
  border-radius:6px;font-size:.6rem;color:#7a6060;
  z-index:10;min-width:205px;user-select:none;
  box-shadow:0 2px 16px #0008;
}
#leg-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px;border-bottom:1px solid #2a1010;
  cursor:move;border-radius:6px 6px 0 0;background:#150a0a;
}
#leg-hdr span{color:#cc5a5a;font-weight:bold;font-size:.65rem;letter-spacing:1px;font-family:'Special Elite',cursive}
#leg-body{padding:9px 11px}
#leg-tog{
  position:absolute;bottom:10px;left:10px;
  background:#0f0808ee;border:1px solid #3a1a1a;
  border-radius:4px;padding:4px 10px;
  font-size:.62rem;color:#cc5a5a;cursor:pointer;z-index:10;display:none;
}

/* ── Sidebar reopen ─────────────────────────────────── */
#sidebar-reopen{
  position:absolute;top:8px;right:8px;z-index:20;
  background:#150a0a;border:1px solid #3a1a1a;
  color:#cc5a5a;border-radius:4px;
  padding:4px 10px;font-size:.62rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;
}
</style>
</head>

// ── Helpers ──────────────────────────────────────────────────────────
function mk(tag,a){const e=document.createElementNS("http://www.w3.org/2000/svg",tag);if(a)Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e;}
function getRC(t){return(REL_TYPES.find(r=>r.id===t)||{color:"#5a4a4a"}).color;}
function getRD(t){return(REL_TYPES.find(r=>r.id===t)||{dash:null}).dash;}
function curvePath(x1,y1,x2,y2){const mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1,b=Math.min(55,len*.22);return`M${x1},${y1} Q${mx-dy/len*b},${my+dx/len*b} ${x2},${y2}`;}

// ── Controls ─────────────────────────────────────────────────────────
function renderCtrl(){
  row1.innerHTML="";row2.innerHTML="";row3.innerHTML="";
  BOOKS.slice(0,4).forEach(b=>row1.appendChild(bookBtn(b)));
  BOOKS.slice(4,8).forEach(b=>row2.appendChild(bookBtn(b)));
  [["⬡ Floor Bands","showBands"],["⚔ F9 Factions","showF9"]].forEach(([lbl,key])=>{
    const t=document.createElement("button");
    t.className="btn tog"+(S[key]?" tog-on":"");
    t.textContent=lbl;
    t.onclick=()=>{S[key]=!S[key];renderSVG();t.className="btn tog"+(S[key]?" tog-on":"");};
    row3.appendChild(t);
  });
  const lt=document.createElement("button");
  lt.className="btn tog"+(legVisible?" tog-on":"");
  lt.textContent="📋 Legend";
  lt.onclick=()=>{legVisible=!legVisible;lt.className="btn tog"+(legVisible?" tog-on":"");renderLegend();};
  row3.appendChild(lt);
}
function bookBtn(b){
  const btn=document.createElement("button");
  btn.className="btn"+(S.book>=b.id?" book-on":"");
  btn.title=b.title+" · "+b.floor+" ("+b.year+")";
  btn.textContent="B"+b.id+" – "+b.short;
  btn.onclick=()=>{S.book=b.id;S.selNode=null;render();};
  return btn;
}

function renderRelBar(){
  relbar.innerHTML="";
  REL_TYPES.forEach(r=>{
    const b=document.createElement("button");
    b.className="rbtn"+(S.rel===r.id?" active":"");
    if(S.rel===r.id)b.style.cssText="border-color:"+r.color+";color:"+r.color;
    b.textContent=r.label;
    b.onclick=()=>{S.rel=r.id;renderSVG();};
    relbar.appendChild(b);
  });
}

// ── SVG ──────────────────────────────────────────────────────────────
function renderSVG(){
  while(svgEl.firstChild)svgEl.removeChild(svgEl.lastChild);
  const defs=mk("defs");
  const mkr=mk("marker",{id:"arr",markerWidth:6,markerHeight:6,refX:6,refY:3,orient:"auto"});
  mkr.appendChild(mk("path",{d:"M0,0 L0,6 L6,3 z",fill:"#3a1a1a"}));
  defs.appendChild(mkr);svgEl.appendChild(defs);
  const g=mk("g",{transform:`translate(${S.pan.x},${S.pan.y}) scale(${S.scale})`});
  svgEl.appendChild(g);

  // ── Floor bands — labels + dividers only, no fill colors ──
  if(S.showBands){
    BANDS.forEach(b=>{
      // Subtle dark stripe every other band for readability
      const isAlt=BANDS.indexOf(b)%2===0;
      if(isAlt){
        const r=mk("rect",{x:0,y:b.y,width:1000,height:b.h,fill:"rgba(255,255,255,.018)"});
        g.appendChild(r);
      }
      // Divider line
      g.appendChild(mk("line",{x1:0,y1:b.y,x2:1000,y2:b.y,stroke:"#2a1010","stroke-width":.8,opacity:.7}));
      // Labels
      const t=mk("text",{x:8,y:b.y+15,fill:"#4a2a2a","font-size":8.5,"font-family":"Special Elite, cursive",opacity:.8,"pointer-events":"none"});
      t.textContent=b.label;g.appendChild(t);
      const t2=mk("text",{x:992,y:b.y+15,fill:"#4a2a2a","font-size":8.5,"font-family":"Special Elite, cursive","text-anchor":"end",opacity:.8,"pointer-events":"none"});
      t2.textContent=b.label;g.appendChild(t2);
    });
  }

  // ── F9 faction zones ──
  const f9band=BANDS.find(b=>b.id==="f9");
  if(S.showF9&&S.book>=7&&f9band){
    const fy=f9band.y,fh=f9band.h,labelH=16,zoneY=fy+labelH,zoneH=fh-labelH;
    g.appendChild(mk("rect",{x:0,y:fy,width:260,height:labelH,fill:"rgba(15,60,15,.85)"}));
    const ggt=mk("text",{x:130,y:fy+11,fill:"#5aee6a","font-size":7.5,"text-anchor":"middle","font-weight":"bold","pointer-events":"none","font-family":"Special Elite, cursive"});
    ggt.textContent="✦ THE GOOD GUYS";g.appendChild(ggt);
    g.appendChild(mk("rect",{x:260,y:fy,width:740,height:labelH,fill:"rgba(70,10,10,.85)"}));
    const blt=mk("text",{x:630,y:fy+11,fill:"#ee5a5a","font-size":7.5,"text-anchor":"middle","font-weight":"bold","pointer-events":"none","font-family":"Special Elite, cursive"});
    blt.textContent="⚔ THE BLOC (8 factions vs Princess Posse)";g.appendChild(blt);
    F9_FACTIONS.forEach(f=>{
      g.appendChild(mk("rect",{x:f.x,y:zoneY,width:f.w,height:zoneH,fill:f.fill,stroke:f.border,"stroke-width":1.2,"stroke-dasharray":f.alliance==="good"?"none":"4 3"}));
      const lbl=mk("text",{x:f.x+f.w/2,y:zoneY+zoneH/2+4,fill:f.border,"font-size":7,"text-anchor":"middle","font-weight":"bold","pointer-events":"none"});
      lbl.textContent=f.short;g.appendChild(lbl);
      if(f.w>=90){
        const lbl2=mk("text",{x:f.x+f.w/2,y:zoneY+zoneH/2+14,fill:f.border,"font-size":5.5,"text-anchor":"middle","pointer-events":"none"});
        lbl2.textContent=f.label;g.appendChild(lbl2);
      }
    });
    const ppCx=65,trCx=195,allyY=zoneY+zoneH/2;
    g.appendChild(mk("line",{x1:ppCx,y1:allyY,x2:trCx,y2:allyY,stroke:"#5aee6a","stroke-width":2.5,opacity:.9}));
    const alt=mk("text",{x:(ppCx+trCx)/2,y:allyY-5,fill:"#5aee6a","font-size":6,"text-anchor":"middle","pointer-events":"none"});
    alt.textContent="married/allied";g.appendChild(alt);
    const wmY=fy+fh+3;
    g.appendChild(mk("rect",{x:260,y:wmY,width:740,height:11,fill:"rgba(60,55,5,.75)",rx:2}));
    const wmt=mk("text",{x:630,y:wmY+8,fill:"#eebb30","font-size":6,"text-anchor":"middle","pointer-events":"none"});
    wmt.textContent="⚡ War Mage Rebellion added mid-game (Warlords: Agatha & Akuma)";g.appendChild(wmt);
  }

  // ── Edges ──
  const visNodes=NODES.filter(n=>n.book<=S.book);
  const visEdges=EDGES.filter(e=>e.book<=S.book&&(S.rel==="all"||e.type===S.rel));
  visEdges.forEach(e=>{
    const fp=S.pos[e.from],tp=S.pos[e.to];if(!fp||!tp)return;
    const col=getRC(e.type),dash=getRD(e.type),hi=S.rel==="all"||S.rel===e.type;
    const p=mk("path",{d:curvePath(fp.x,fp.y,tp.x,tp.y),fill:"none",stroke:col,"stroke-width":hi?1.5:.3,opacity:hi?.55:.07,"marker-end":"url(#arr)"});
    if(dash)p.setAttribute("stroke-dasharray",dash);
    g.appendChild(p);
    if(hi){
      const mx=(fp.x+tp.x)/2,my=(fp.y+tp.y)/2;
      const l=mk("text",{x:mx,y:my-4,fill:col,"font-size":6.5,"text-anchor":"middle",opacity:.8,"pointer-events":"none"});
      l.textContent=e.label;g.appendChild(l);
    }
  });

  // ── Nodes ──
  visNodes.forEach(n=>{
    const pos=S.pos[n.id];if(!pos)return;
    const r=n.size==="main"?24:16;
    const faded=n.lastBook<S.book,isNew=n.book===S.book,sel=S.selNode&&S.selNode.id===n.id;
    const nc=FC[n.faction]||"#cc3333";
    const grp=mk("g",{"data-id":n.id,style:"cursor:pointer",opacity:faded?.18:1});
    g.appendChild(grp);
    if(isNew)grp.appendChild(mk("circle",{cx:pos.x,cy:pos.y,r:r+7,fill:"none",stroke:nc,"stroke-width":1.5,"stroke-dasharray":"4 3",opacity:.9}));
    // Glow behind selected
    if(sel){
      const glow=mk("circle",{cx:pos.x,cy:pos.y,r:r+4,fill:nc,opacity:.15});
      grp.appendChild(glow);
    }
    grp.appendChild(mk("circle",{cx:pos.x,cy:pos.y,r,fill:sel?nc:"#1a0808",stroke:nc,"stroke-width":sel?2.5:1.5}));
    const ini=mk("text",{x:pos.x,y:pos.y+4,fill:sel?"#0a0505":nc,"font-size":n.size==="main"?9:7,"text-anchor":"middle","font-weight":"bold","pointer-events":"none"});
    ini.textContent=n.label.split(" ").map(w=>w[0]).join("").slice(0,3);grp.appendChild(ini);
    const lbl=mk("text",{x:pos.x,y:pos.y+r+12,fill:sel?"#e8a060":nc,"font-size":n.size==="main"?10:8.5,"text-anchor":"middle","font-weight":n.size==="main"?"bold":"normal","pointer-events":"none"});
    lbl.textContent=n.label;grp.appendChild(lbl);
    if(n.status==="dead"){
      const sk=mk("text",{x:pos.x+r*.65,y:pos.y-r*.65,"font-size":10,"pointer-events":"none"});
      sk.textContent="💀";grp.appendChild(sk);
    }
    if(faded){
      const xt=mk("text",{x:pos.x,y:pos.y+r+22,fill:n.status==="dead"?"#5a2020":"#2a1a1a","font-size":6.5,"text-anchor":"middle","pointer-events":"none"});
      xt.textContent=n.status==="dead"?"(deceased)":"(inactive)";grp.appendChild(xt);
    }
    if(S.book>=7&&n.f9){
      const f9f=F9_FACTIONS.find(f=>f.id===n.f9);
      if(f9f)grp.appendChild(mk("circle",{cx:pos.x-r*.65,cy:pos.y+r*.65,r:4.5,fill:f9f.fill,stroke:f9f.border,"stroke-width":1}));
    }
    grp.addEventListener("mousedown",e=>{e.stopPropagation();S.ndrag=n.id;});
    grp.addEventListener("click",e=>{e.stopPropagation();if(!S.wasDrag){S.selNode=n;sidebarOpen=true;applySidebar();renderSidebar();}});
  });

  renderLegend();
}

    tog=document.createElement("button");tog.id="leg-tog";
    tog.style.cssText="position:absolute;bottom:10px;left:10px;background:#0f0808ee;border:1px solid #3a1a1a;border-radius:4px;padding:4px 10px;font-size:.62rem;color:#cc5a5a;cursor:pointer;z-index:10;display:none;font-family:'DM Sans',sans-serif";
    tog.textContent="📋 Legend";
    tog.onclick=()=>{legVisible=true;renderLegend();};
    canvasEl.appendChild(tog);
  }
  let leg=document.getElementById("leg-ov");
  if(!leg){
    leg=document.createElement("div");leg.id="leg-ov";
    leg.style.cssText="position:absolute;left:10px;bottom:10px;background:#0f0808ee;border:1px solid #3a1a1a;border-radius:6px;font-size:.6rem;color:#7a6060;z-index:10;min-width:205px;user-select:none;box-shadow:0 2px 16px #0008";
    canvasEl.appendChild(leg);
    leg.addEventListener("mousedown",e=>{
      const hdr=document.getElementById("leg-hdr");
      if(!hdr||!hdr.contains(e.target))return;
      legDrag=true;const r=leg.getBoundingClientRect();
      legDS={mx:e.clientX,my:e.clientY,lx:r.left,ly:r.top};e.preventDefault();
    });
  }
  tog.style.display=legVisible?"none":"block";
  if(!legVisible){leg.style.display="none";return;}
  leg.style.display="block";
  if(legPos.y!==null){leg.style.bottom="auto";leg.style.top=legPos.y+"px";leg.style.left=legPos.x+"px";}
  else{leg.style.bottom="10px";leg.style.top="auto";leg.style.left=legPos.x+"px";}

  let h=`<div id="leg-hdr" style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid #2a1010;cursor:move;border-radius:6px 6px 0 0;background:#150a0a">
    <span style="color:#cc5a5a;font-weight:bold;font-size:.65rem;letter-spacing:1px;font-family:'Special Elite',cursive">LEGEND</span>
    <button id="leg-close-btn" style="background:none;border:1px solid #3a1a1a;color:#7a6060;border-radius:4px;padding:0 5px;font-size:.63rem;cursor:pointer;line-height:1.5">✕</button>
  </div><div id="leg-body" style="padding:9px 11px">`;

  h+="<div style='color:#cc5a5a;font-size:.58rem;text-transform:uppercase;margin-bottom:3px;font-family:Special Elite,cursive'>Relationship Lines</div>";
  REL_TYPES.filter(r=>r.id!=="all").forEach(r=>{
    const ds=r.dash?"border-top:1.5px dashed "+r.color:"border-top:1.5px solid "+r.color;
    h+=`<div style='display:flex;align-items:center;gap:7px;margin:2px 0'><div style='width:26px;height:0;${ds};flex-shrink:0'></div><span style='color:${r.color}'>${r.label}</span></div>`;
  });
  h+="<div style='color:#cc5a5a;font-size:.58rem;text-transform:uppercase;margin:7px 0 3px;font-family:Special Elite,cursive'>Factions</div>";
  Object.entries(FC).forEach(([k,v])=>{h+=`<div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:9px;height:9px;border-radius:50%;border:2px solid ${v};background:transparent;flex-shrink:0'></div><span>${FL[k]||k}</span></div>`;});
  h+="<div style='color:#cc5a5a;font-size:.58rem;text-transform:uppercase;margin:7px 0 3px;font-family:Special Elite,cursive'>Icons</div>";
  [["💀","Deceased (RIP, probably)"],["✦ dashed ring","New this book"],["Faded","Inactive or deceased"],["Large node","Main character"],["Small node","Supporting"],["◉ dot (B7+)","Floor 9 war faction"]].forEach(([ic,desc])=>{
    h+=`<div style='display:flex;align-items:center;gap:6px;margin:2px 0'><span style='color:#e8a060;min-width:78px;flex-shrink:0'>${ic}</span><span>${desc}</span></div>`;
  });
  if(S.book>=7){
    h+="<div style='color:#cc5a5a;font-size:.58rem;text-transform:uppercase;margin:7px 0 3px;font-family:Special Elite,cursive'>F9 Alliances</div>";
    h+=`<div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:26px;height:0;border-top:2px solid #5aee6a;flex-shrink:0'></div><span style='color:#5aee6a'>The Good Guys</span></div>`;
    h+=`<div style='display:flex;align-items:center;gap:6px;margin:2px 0'><div style='width:26px;height:0;border-top:2px dashed #ee5a5a;flex-shrink:0'></div><span style='color:#ee5a5a'>The Bloc</span></div>`;
  }
  h+="</div>";
  leg.innerHTML=h;
  const cb=document.getElementById("leg-close-btn");
  if(cb)cb.addEventListener("click",()=>{legVisible=false;renderLegend();});
}

// ── Sidebar ────────────────────────────────────────────────────────────
function applySidebar(){
  const sb=document.getElementById("sidebar");
  let rb=document.getElementById("sidebar-reopen");
  if(!rb){
    rb=document.createElement("button");rb.id="sidebar-reopen";
    rb.textContent="📋 Info";
    rb.style.cssText="position:absolute;top:8px;right:8px;z-index:20;background:#150a0a;border:1px solid #3a1a1a;color:#cc5a5a;border-radius:4px;padding:4px 10px;font-size:.62rem;cursor:pointer;font-family:'DM Sans',sans-serif";
    rb.addEventListener("click",()=>{sidebarOpen=true;applySidebar();renderSidebar();});
    canvasEl.appendChild(rb);
  }
  sb.style.display=sidebarOpen?"flex":"none";
  rb.style.display=sidebarOpen?"none":"block";
}

function renderSidebar(){
  sBody.innerHTML="";
  if(S.selNode){
    const n=NODES.find(x=>x.id===S.selNode.id);if(!n)return;
    sTitle.textContent=n.label;
    const nc=FC[n.faction]||"#cc3333";
    const emoji=FEMOJI[n.faction]||"⚔️";
    const f9f=S.book>=7&&n.f9?F9_FACTIONS.find(f=>f.id===n.f9):null;

    // Portrait
    const portrait=document.createElement("div");
    portrait.id="char-portrait";
    portrait.innerHTML=`<span style="font-size:3.5rem;z-index:1">${emoji}</span>
      <div class="faction-bar" style="background:${nc}22;color:${nc};border-top:1px solid ${nc}44">${FL[n.faction]||n.faction}</div>`;
    sBody.appendChild(portrait);

    // Card body
    const body=document.createElement("div");body.id="card-body";
    let h=`<h2 style="color:${nc}">${n.label}</h2>`;
    h+=`<div style="margin:5px 0">`;
    h+=`<span class="tag" style="background:${nc}22;border:1px solid ${nc}44;color:${nc}">${n.role}</span>`;
    if(n.status==="dead")h+=`<span class="tag" style="background:#3a0a0a;border:1px solid #5a1a1a;color:#cc5a5a">💀 Deceased</span>`;
    if(n.book===S.book)h+=`<span class="tag" style="background:#1a1505;border:1px solid #5a3a10;color:#e8a030">✦ New this book</span>`;
    if(f9f)h+=`<span class="tag" style="background:${f9f.fill};border:1px solid ${f9f.border};color:${f9f.border}">⚔ ${f9f.label}</span>`;
    h+=`</div>`;
    h+=`<div class="stat-row">
      <div class="stat"><b>Introduced</b>Book ${n.book}</div>
      <div class="stat"><b>Status</b>${n.status==="dead"?"💀 Dead":"Alive"}</div>
      <div class="stat"><b>Type</b>${n.size==="main"?"Main":"Supporting"}</div>
    </div>`;
    h+=`<div class="stat" style="display:block;margin-bottom:8px"><b>Class / Magic</b>${n.magic}</div>`;
    h+=`<div class="bio-text">${n.bio}</div>`;
    h+=`<div class="ch4">Connections</div><div id="clist"></div>`;
    body.innerHTML=h;
    sBody.appendChild(body);

    const cl=document.getElementById("clist");
    const conns=EDGES.filter(e=>(e.from===n.id||e.to===n.id)&&e.book<=S.book);
    if(!conns.length){cl.innerHTML="<div class='ci' style='color:#3a2020;padding:4px'>No connections visible yet</div>";}
    else conns.forEach(e=>{
      const oid=e.from===n.id?e.to:e.from,o=NODES.find(x=>x.id===oid);if(!o)return;
      const col=getRC(e.type);
      cl.insertAdjacentHTML("beforeend",`<div class='ci'><span class='cn'>${o.label}</span> — ${e.label} <span style='color:${col};font-size:.6rem'>[${e.type}]</span></div>`);
    });
  } else {
    sTitle.textContent=BOOKS[S.book-1]?BOOKS[S.book-1].short:"Broadcast Feed";
    const b=BOOKS[S.book-1],evts=KEY_EVENTS[S.book]||[];
    let h=`<div class="panel"><h3>${b.title}</h3><p style="color:#5a3a3a;font-size:.67rem">${b.floor} · ${b.year}</p></div>`;
    h+=`<div class="panel"><h3>Key Events</h3>`;
    evts.forEach((ev,i)=>{h+=`<div class="evt${i<2?" major":""}">${ev}</div>`;});
    h+=`</div>`;
    if(S.book>=7){
      h+=`<div class="panel"><h3>⚔ Floor 9 Factions</h3>`;
      h+=`<p style="color:#5aee6a;margin-bottom:4px;font-size:.67rem">✦ THE GOOD GUYS</p>`;
      F9_FACTIONS.filter(f=>f.alliance==="good").forEach(f=>{h+=`<div class="evt" style="border-color:${f.border};color:${f.border}">${f.label}</div>`;});
      h+=`<p style="color:#ee5a5a;margin:6px 0 4px;font-size:.67rem">⚔ THE BLOC</p>`;
      F9_FACTIONS.filter(f=>f.alliance==="bloc").forEach(f=>{h+=`<div class="evt" style="border-color:${f.border};color:${f.border}">${f.label}</div>`;});
      h+=`<p style="color:#eebb30;margin:6px 0 4px;font-size:.67rem">⚡ MID-GAME</p>`;
      h+=`<div class="evt" style="border-color:#eebb30;color:#eebb30">War Mage Rebellion (Agatha & Akuma)</div></div>`;
    }
    sBody.innerHTML=h;
  }
}

function render(){renderCtrl();renderRelBar();renderSVG();renderSidebar();applySidebar();}

// ── Interaction ────────────────────────────────────────────────────────
let ms=null;
svgEl.addEventListener("mousedown",e=>{if(S.ndrag)return;ms={x:e.clientX,y:e.clientY,px:S.pan.x,py:S.pan.y};S.wasDrag=false;});
window.addEventListener("mousemove",e=>{
  if(legDrag&&legDS){
    const leg=document.getElementById("leg-ov");if(!leg)return;
    const nx=legDS.lx+(e.clientX-legDS.mx),ny=legDS.ly+(e.clientY-legDS.my);
    leg.style.left=nx+"px";leg.style.top=ny+"px";leg.style.bottom="auto";
    legPos={x:nx,y:ny};return;
  }
  if(S.ndrag){S.wasDrag=true;const r=svgEl.getBoundingClientRect();S.pos[S.ndrag]={x:(e.clientX-r.left-S.pan.x)/S.scale,y:(e.clientY-r.top-S.pan.y)/S.scale};renderSVG();return;}
  if(ms){const dx=e.clientX-ms.x,dy=e.clientY-ms.y;if(Math.abs(dx)>3||Math.abs(dy)>3)S.wasDrag=true;S.pan={x:ms.px+dx,y:ms.py+dy};renderSVG();}
});
window.addEventListener("mouseup",()=>{legDrag=false;legDS=null;S.ndrag=null;ms=null;setTimeout(()=>{S.wasDrag=false;},50);});
svgEl.addEventListener("click",e=>{if(!S.wasDrag){S.selNode=null;renderSidebar();}});
canvasEl.addEventListener("wheel",e=>{e.preventDefault();S.scale=Math.min(3,Math.max(.18,S.scale-e.deltaY*.001));renderSVG();},{passive:false});

render();
</script>
</body>
</html>
